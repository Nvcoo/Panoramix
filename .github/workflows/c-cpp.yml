name: Build and test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5

    - name: Install clang
      run: sudo apt-get install -y clang

    - name: Build
      run: make

    - name: Test
      run: ./panoramix 3 5 3 1
